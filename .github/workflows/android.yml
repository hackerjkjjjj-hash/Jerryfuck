cat << 'EOF' > .github/workflows/android.yml
name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 ទាញយកកូដ
        uses: actions/checkout@v3

      - name: ⚙️ រៀបចំ Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: 🛠️ រៀបចំ Java សម្រាប់ Android
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🚀 ដំឡើង Capacitor CLI
        run: npm install -g @capacitor/cli@latest

      - name: 📦 បង្កើតគម្រោង Android
        run: |
          npm install
          npx cap init JerryApp com.jerry.app --web-dir www
          npm install @capacitor/android
          npx cap add android
          npx cap copy android
          
      - name: 🏗️ Build ឯកសារ APK
        run: |
          cd android
          ./gradlew assembleDebug
          
      - name: 📤 បញ្ចេញឯកសារ APK ឱ្យទាញយក
        uses: actions/upload-artifact@v3
        with:
          name: JerryApp-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
EOF
